name: g1_dof27
env:
  blind: true
  num_envs: ${num_envs}

  num_one_step_perception: 162 #104
  num_privileged_perception: 220 #187
  num_actor_history: 5
  num_actor_history_high: 1
  num_critic_history: 1
  num_critic_history_low: 1
  
  num_actions: 28 # number of actuators on robot
  num_dofs: 27
  num_one_step_observations: 94
  num_one_step_privileged_obs: 128

  num_observations: 470
  num_privileged_obs: 128

  num_observations_high: 94
  num_privileged_obs_high: 128
  
  env_spacing: 5.  # not used with heightfields/trimeshes 
  send_timeouts: true # send time out information to the algorithm
  episode_length_s: 10 # episode length  in seconds
  fixed_episode_length: false
  odometry: true # use odometry for the robot, if true, num_observations is 430



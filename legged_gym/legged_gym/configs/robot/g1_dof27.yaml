asset:
  file: /resources/robots/g1/urdf/g1_27dof.urdf
  name: "g1_dof29"
  foot_name: "ankle_roll"
  foot_side_name: 'ankle_roll_side'
  left_foot_name: "left_foot"
  right_foot_name: "right_foot"
  penalize_contacts_on: ["knee", 'hip_yaw']
  terminate_after_contacts_on: []

  waist_joints: ["waist_yaw_joint"]
  knee_joints: ['left_knee_joint', 'right_knee_joint']  
  ankle_joints: [ "left_ankle_pitch_joint", "right_ankle_pitch_joint", "left_wrist_roll_joint", "right_wrist_roll_joint"]
  upper_body_link: "torso_link"
  imu_link: "imu_link"
  knee_names: ["left_knee_link", "right_knee_link"]
  
  keyframe_name: "keyframe"
  base_name: 'torso_link'
  lidar_name: "mid360"

  feet_contact_binding: {
      "left_ankle": "left_ankle_roll_link", 
      "right_ankle": "right_ankle_roll_link"}
  keyframe_weights: {
      "head": 1.0, "torso": 2.0, "pelvis": 2.0,
      "collar": 1.0, "shoulder": 1.0, 
      "elbow": 1.0, "wrist": 2.0,
      "hip": 1.0, "knee": 1.0, "ankle": 2.0}
  upper_keyframe_names: ['keyframe_pelvis_link', 'keyframe_head_link', 'keyframe_torso_link', 'keyframe_left_collar_link', 'keyframe_left_shoulder_link', 'keyframe_left_elbow_link', 'keyframe_left_wrist_link', 'keyframe_right_collar_link', 'keyframe_right_shoulder_link', 'keyframe_right_elbow_link', 'keyframe_right_wrist_link']
  lower_keyframe_names: ['keyframe_left_hip_link', 'keyframe_left_knee_link', 'keyframe_left_ankle_link', 'keyframe_right_hip_link', 'keyframe_right_knee_link', 'keyframe_right_ankle_link']

  trunk_names: ["pelvis", "torso"]  # navigation
  mobile_names: ["knee", "ankle"]  # locomotion
  marker_names: ["head", "elbow", "wrist"]  # manipulation

  disable_gravity: false
  collapse_fixed_joints: false # merge bodies connected by fixed joints. Specific fixed joints can be kept by adding " <... dont_collapse="true">
  fix_base_link: false # fixe the base of the robot
  default_dof_drive_mode: 3 # see GymDofDriveModeFlags (0 is none, 1 is pos tgt, 2 is vel tgt, 3 effort)
  self_collisions: 0 # 1 to disable, 0 to enable...bitwise filter
  replace_cylinder_with_capsule: true # replace collision cylinders with capsules, leads to faster/more stable simulation
  flip_visual_attachments: false

  density: 0.001
  angular_damping: 0.01
  linear_damping: 0.01
  max_angular_velocity: 1000.
  max_linear_velocity: 1000.
  armature: 0.
  thickness: 0.01
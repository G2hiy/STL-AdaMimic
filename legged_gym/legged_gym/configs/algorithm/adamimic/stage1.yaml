task: 'motion_tracking'
algo_name: adamimic_stage1

algorithm:
  infer_keyframe_time: true
  apply_reward_scale: true
  sparse_global: true
  sparse_local: false
  special_scale: true
  special_scale_size: 50

  reverse_term_curriculum: true
  reverse_term_curriculum_iter: 8000
  rsi: true
  no_sparse: false
  amp: false
  no_dense: false
  no_aug: false

  # --- 创新点① Diffusion 参考增强（默认关闭，不影响 ablation 路径） ---
  use_diffusion_ref: false
  diffusion_ref_path: ${base}/resources/dataset/g1_dof27_data_diff/${task_id}/variants.pt
  diffusion_sample_policy: random   # only `random` is implemented in this branch
  # Hydra reminder:
  #   algorithm.algorithm.use_diffusion_ref=true
  #   algorithm.algorithm.diffusion_ref_path=/abs/path/to/variants.pt

  # --- 创新点② 真 STL 连续奖励（替换 Stage 1 稀疏全局奖励 r_k^global） ---
  # 启用方式：algorithm.algorithm.use_stl_reward=true 且
  #           通过 rewards.scales.sparse_stl_<task>=<w> 覆盖；
  # 若 stl_replace_sparse_tracking=true，启用时自动将原 sparse_tracking_body_position/_feet/_rot
  # 的权重置零，实现"替换"语义。
  use_stl_reward: false
  stl_rho_scale: 0.2                 # tanh(ρ / scale) 归一化到 [-1, 1]
  stl_beta_softmin: 10.0             # DSL softmin/softmax 锐度
  stl_replace_sparse_tracking: true  # 启用时自动关掉 sparse_tracking_* 原项
  # Task-specific predicate thresholds（可在 task yaml 里覆盖）
  stl_far_jump:
    f_air: 5.0           # N，airborne 期间 max feet force 上界
    f_land: 20.0         # N，land 后 min feet force 下界
    d_xy: 0.15           # m，落地时 body xy 偏差阈值
    delta_apex: 0.10     # s，apex 窗口半宽
    delta_land: 0.15     # s，land 窗口长度
    h_apex_min: 0.55     # m，apex 高度阈值（先给 g1 站立高度略低的占位值，跑前建议可视化 ref）

termination_curriculum:
  terminate_when_motion_far_curriculum: true
  terminate_when_motion_far_initial_threshold: 1.5
  terminate_when_motion_far_threshold_max: 2
  terminate_when_motion_far_threshold_min: 0.6
  terminate_when_motion_far_curriculum_degree: 0.000025

  terminate_when_motion_far_curriculum_level_down_threshold: 40
  terminate_when_motion_far_curriculum_level_up_threshold: 42


reward_limit:
  reward_limits_curriculum:
    soft_dof_pos_curriculum: true
    soft_dof_pos_initial_limit: 1.15
    soft_dof_pos_max_limit: 1.25
    soft_dof_pos_min_limit: 0.98
    soft_dof_pos_curriculum_degree: 0.0000005
    soft_dof_pos_curriculum_level_down_threshold: 40
    soft_dof_pos_curriculum_level_up_threshold: 42

    soft_dof_vel_curriculum: true
    soft_dof_vel_initial_limit: 1.15
    soft_dof_vel_max_limit: 1.25
    soft_dof_vel_min_limit: 0.98
    soft_dof_vel_curriculum_degree: 0.0000005
    soft_dof_vel_curriculum_level_down_threshold: 40
    soft_dof_vel_curriculum_level_up_threshold: 42

    soft_torque_curriculum: true
    soft_torque_initial_limit: 1.15
    soft_torque_max_limit: 1.25
    soft_torque_min_limit: 0.98
    soft_torque_curriculum_degree: 0.0000005
    soft_torque_curriculum_level_down_threshold: 40
    soft_torque_curriculum_level_up_threshold: 42

reward_penalty:
  reward_penalty_curriculum: true
  reward_penalty_degree: 0.000003
  reward_initial_penalty_scale: 0.10
  reward_min_penalty_scale: 0.0
  reward_max_penalty_scale: 0.2
  reward_penalty_level_down_threshold: 40
  reward_penalty_level_up_threshold: 42

  reward_penalty_reward_names: [
      "dense_dof_pos_limits",
      "dense_dof_vel_limits",
      "dense_torque_limits",
      "dense_torques",
      "dense_dof_vel",
      "dense_action_rate",
      "dense_feet_slippage"]

algo:
  seed: 1
  runner_class_name: TrackOnPolicyRunner

  policy:
    actor_hidden_dims: [512, 256, 128] 
    critic_hidden_dims: [512, 256, 128]
    actor_time_scale_range: [-0.0, 0.0]
    fixed_dt: 0.02
    actor_time_init_noise_std: 0.8
    init_noise_std: 0.8
    activation: 'elu' # can be elu, relu, selu, crelu, lrelu, tanh, sigmoid
    schedule: 'fixed' # could be adaptive, fixed
    infer_keyframe_time: true
    resume: false

  algorithm:
    value_loss_coef: 1.0
    use_clipped_value_loss: true
    clip_param: 0.2
    entropy_coef: 0.01
    num_learning_epochs: 5
    num_mini_batches: 4 # mini batch size: num_envs*nsteps / nminibatches
    learning_rate: 1.e-3 #5.e-4
    schedule: 'adaptive' # could be adaptive, fixed
    gamma: [0.99, 1]
    lam: 0.95
    desired_kl: 0.01
    max_grad_norm: 1.
    use_smooth: true
    infer_keyframe_time: true
    train_high: false
    use_timeout: [true, false]
    amp: null
    
  runner:
    policy_class_name: 'TrackActorCritic'
    algorithm_class_name: 'TrackPPO'
    num_steps_per_env: 75 # per iteration
    max_iterations: 40000 # number of policy updates
    train_high: false

    # logging
    save_interval: 500 # check for potential saves every this many iterations
    experiment_name: ${env.asset.name}_adamimic_stage1
    run_name: ${run_name}
    wandb_project: "adamimic"
    logger: 'wandb'

    # load and resume
    resume: false
    load_run: -1 # -1: last run
    checkpoint: -1 # -1: last saved model
    resume_path: null

  amp: null
